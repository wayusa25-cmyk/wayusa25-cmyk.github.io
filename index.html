<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quindochi</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>

    :root {
      --leaf: #255f34; --lime: #8bd450; --gold: #f4b73b;
      --ink: #173222; --cream: #fff7df; --panel-border: #5a8a3c;
      --panel-text: #b8ff88; --panel-bg: rgba(20,12,8,0.97);
      font-family: "Press Start 2P", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg,#1a3a52 0%,#2d6b8a 40%,#4a9db5 70%,#6fb8d0 100%);
    }
    body.sky-night { background: linear-gradient(160deg,#050a1a 0%,#0a1535 40%,#0d1f4a 70%,#1a2d5a 100%); }
    body.sky-dawn  { background: linear-gradient(160deg,#1a0a2e 0%,#8b3a62 30%,#e07b39 60%,#f4c56a 100%); }
    body.sky-day   { background: linear-gradient(160deg,#1a6fb5 0%,#3a9ed4 40%,#6dc5e8 70%,#9ee0f5 100%); }
    body.sky-afternoon { background: linear-gradient(160deg,#1a4a8a 0%,#e07030 40%,#f4a842 70%,#f4d070 100%); }
    body.sky-evening   { background: linear-gradient(160deg,#0a1530 0%,#4a2060 40%,#9a4a80 70%,#e07060 100%); }

    /* === DEVICE SHELL === */
    .device {
      width: 360px;
      background: #1a1a2e;
      border-radius: 32px;
      border: 3px solid #444;
      box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 10px rgba(255,255,255,0.05);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      user-select: none;
    }
    .device-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
    }
    .device-top .title { color: #8bd450; font-size: 8px; letter-spacing: 2px; }
    .device-top .info-bar { color: #f4b73b; font-size: 7px; text-align: right; }

    /* === SCREEN === */
    .screen-wrap {
      background: #0a0a14;
      border-radius: 16px;
      border: 2px solid #333;
      overflow: hidden;
      position: relative;
      height: 280px;
    }
    .screen-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
      opacity: 0.85;
    }
    .screen-pet {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 160px;
      width: auto;
      image-rendering: pixelated;
      /* NO filter - transparent bg already handled */
    }
    .screen-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 8px;
      pointer-events: none;
    }
    .speech-bubble {
      background: rgba(255,247,223,0.95);
      border: 2px solid var(--leaf);
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 7px;
      color: var(--ink);
      max-width: 85%;
      text-align: center;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.3s;
      position: relative;
    }
    .speech-bubble.show { opacity: 1; }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--leaf);
    }

    /* === STATS === */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 0 4px;
    }
    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-label {
      font-size: 6px;
      color: #8bd450;
      display: flex;
      justify-content: space-between;
    }
    .stat-bar {
      height: 8px;
      background: #0a0a14;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    .stat-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .stat-fill.hunger   { background: linear-gradient(90deg,#e07b39,#f4b73b); }
    .stat-fill.happy    { background: linear-gradient(90deg,#8bd450,#5fcf1a); }
    .stat-fill.energy   { background: linear-gradient(90deg,#4a9db5,#6fb8d0); }
    .stat-fill.health   { background: linear-gradient(90deg,#e04a4a,#f47b7b); }

    /* === AGE BAR === */
    .age-section {
      padding: 0 4px;
    }
    .age-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .age-label { font-size: 6px; color: #8bd450; min-width: 60px; }
    .age-bar {
      flex: 1;
      height: 8px;
      background: #0a0a14;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    .age-fill {
      height: 100%;
      background: linear-gradient(90deg,#8b3a62,#e07b39,#f4b73b);
      border-radius: 4px;
      transition: width 0.5s;
    }
    .age-num { font-size: 6px; color: #f4b73b; min-width: 24px; text-align: right; }

    /* === BUTTONS === */
    .btn-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 0 4px;
    }
    .btn {
      background: #0d1f10;
      border: 2px solid #255f34;
      border-radius: 8px;
      color: #8bd450;
      font-family: "Press Start 2P", monospace;
      font-size: 6px;
      padding: 8px 4px;
      cursor: pointer;
      text-align: center;
      line-height: 1.8;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover  { background: #1a3a1e; }
    .btn:active { transform: scale(0.95); }
    .btn .btn-icon { font-size: 14px; display: block; margin-bottom: 3px; }
    .btn.disabled { opacity: 0.4; cursor: not-allowed; }

    /* === LOG === */
    .log-wrap {
      background: #050810;
      border: 1px solid #222;
      border-radius: 8px;
      height: 40px;
      overflow: hidden;
      padding: 4px 8px;
    }
    .log-text {
      font-size: 6px;
      color: #8bd450;
      line-height: 1.8;
    }

    /* === MODALS === */
    .modal {
      display: none;
      position: absolute;
      inset: 0;
      background: var(--panel-bg);
      border-radius: 14px;
      padding: 16px 12px;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }
    .modal.open { display: flex; }
    .modal-title {
      font-size: 8px;
      color: #f4b73b;
      text-align: center;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .modal-body { flex: 1; overflow-y: auto; }
    .modal-close {
      background: #e04a4a;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: "Press Start 2P", monospace;
      font-size: 6px;
      padding: 8px;
      cursor: pointer;
      align-self: center;
    }
    .shop-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 4px 0;
    }
    .shop-item {
      background: #0d1f10;
      border: 1px solid #255f34;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
    }
    .shop-item:hover { border-color: #f4b73b; }
    .shop-item .item-icon { font-size: 20px; }
    .shop-item .item-name { font-size: 5px; color: #8bd450; margin-top: 4px; }
    .shop-item .item-cost { font-size: 5px; color: #f4b73b; margin-top: 2px; }
    .coins-display {
      font-size: 7px;
      color: #f4b73b;
      text-align: center;
    }
    .screen-wrap { position: relative; }
  
/* === ENVIRONMENT TRASH + CLEANING === */
.screen-bg {
  z-index: 0;
  image-rendering: pixelated;
}
.environment-trash-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}
.trash-sprite {
  position: absolute;
  width: 34px;
  height: 34px;
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  image-rendering: pixelated;
  opacity: 0;
  transform: translateY(-4px) scale(0.85);
  transition: opacity 1.2s steps(4), transform 1.2s steps(4);
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.35));
}
.trash-sprite.visible {
  opacity: 0.95;
  transform: translateY(0) scale(1);
}
.trash-sprite.cleaning {
  opacity: 0;
  transform: translateY(6px) scale(0.72);
  transition: opacity 0.8s steps(5), transform 0.8s steps(5);
}
.screen-pet { z-index: 3; }
.screen-overlay { z-index: 6; }
.cleaning-layer {
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: hidden;
  opacity: 0;
}
.cleaning-layer.active { opacity: 1; }
.cleaning-can {
  position: absolute;
  top: 44px;
  left: 55%;
  width: 46px;
  height: 28px;
  background: #b8d7df;
  border: 3px solid var(--ink);
  image-rendering: pixelated;
  animation: canWiggle 1.1s steps(3) infinite;
}
.cleaning-can::before {
  content: '';
  position: absolute;
  left: -20px;
  top: 10px;
  width: 22px;
  height: 8px;
  background: #b8d7df;
  border: 3px solid var(--ink);
  border-right: 0;
  transform: rotate(-18deg);
  transform-origin: right center;
}
.cleaning-can::after {
  content: '';
  position: absolute;
  right: -13px;
  top: 4px;
  width: 14px;
  height: 17px;
  border: 3px solid var(--ink);
  border-left: 0;
  border-radius: 0 10px 10px 0;
}
.clean-drop {
  position: absolute;
  top: 77px;
  width: 5px;
  height: 8px;
  background: #77d9ff;
  border: 1px solid #1f6f9b;
  image-rendering: pixelated;
  opacity: 0;
  animation: cleanDrop 0.85s steps(5) infinite;
}
.clean-shine {
  position: absolute;
  inset: 0;
  background: rgba(180,245,255,0.12);
  animation: cleanFlash 1.6s steps(4) 1;
}
@keyframes canWiggle {
  0%, 100% { transform: rotate(-4deg); }
  50% { transform: rotate(6deg) translateY(2px); }
}
@keyframes cleanDrop {
  0% { opacity: 0; transform: translateY(0); }
  18% { opacity: 1; }
  100% { opacity: 0; transform: translateY(82px); }
}
@keyframes cleanFlash {
  0%, 100% { opacity: 0; }
  35% { opacity: 1; }
}

/* === DEV CONSOLE === */
.dev-console {
  position: fixed;
  left: 16px;
  bottom: 16px;
  width: min(520px, calc(100vw - 32px));
  height: 260px;
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  background: rgba(2, 10, 6, 0.96);
  border: 3px solid #4fb85c;
  box-shadow: 0 0 0 3px #102716, 0 0 24px rgba(79,184,92,0.25);
  color: #7dff75;
  font-family: "Press Start 2P", monospace;
  font-size: 7px;
  line-height: 1.7;
  z-index: 100;
}
.dev-console.open { display: flex; }
.dev-console-title {
  color: #f4b73b;
  border-bottom: 1px solid #255f34;
  padding-bottom: 6px;
}
.dev-console-history {
  flex: 1;
  overflow-y: auto;
  white-space: pre-wrap;
  scrollbar-color: #4fb85c #071009;
}
.dev-console-line.error { color: #ff7777; }
.dev-console-form {
  display: flex;
  align-items: center;
  gap: 6px;
  border-top: 1px solid #255f34;
  padding-top: 6px;
}
.dev-console-prompt { color: #f4b73b; }
.dev-console-input {
  flex: 1;
  min-width: 0;
  background: transparent;
  border: 0;
  outline: 0;
  color: #7dff75;
  font: inherit;
}
.age-num { min-width: 44px; }
  


  
/* === STORY GROWTH UPDATE 2026-06-10 === */
body.quindochi-enhanced {
  min-height: 100vh;
  gap: 18px;
  overflow-x: hidden;
  padding: 14px;
}

.device {
  width: min(360px, calc(100vw - 28px));
  max-width: 360px;
}

.screen-wrap {
  aspect-ratio: 328 / 280;
  height: auto;
  min-height: 0;
}

.screen-bg {
  transition: background-image 0.45s ease, opacity 0.45s ease;
  image-rendering: pixelated;
}

.screen-pet {
  transform-origin: center bottom;
  transition: height 0.28s ease, bottom 0.28s ease, filter 0.28s ease;
}

.screen-pet.life-egg {
  height: 112px;
  bottom: 74px;
}

.screen-pet.life-baby {
  height: 155px;
  bottom: 8px;
}

.screen-pet.life-child {
  height: 175px;
  bottom: 3px;
}

.screen-pet.life-adult {
  height: 190px;
  bottom: 0;
}

.screen-pet.life-transcend {
  height: 205px;
  bottom: 0;
  filter: drop-shadow(0 0 10px rgba(244, 183, 59, 0.62));
}

.screen-pet.egg-shaking {
  animation: eggShake 0.22s steps(2) infinite;
}

.screen-pet.pet-dead {
  filter: grayscale(0.75) brightness(0.72);
}

@keyframes eggShake {
  0%, 100% { transform: translateX(-50%) rotate(-2deg); }
  50% { transform: translateX(-50%) rotate(2deg); }
}

.story-overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: rgba(2, 8, 15, 0.82);
  z-index: 120;
}

.story-overlay.open {
  display: flex;
}

.story-box {
  width: min(620px, calc(100vw - 28px));
  max-height: min(76vh, 680px);
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 18px;
  border: 3px solid #5a8a3c;
  border-radius: 12px;
  background: rgba(8, 13, 21, 0.98);
  box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45), inset 0 0 0 2px rgba(244, 183, 59, 0.14);
}

.story-kicker {
  color: #f4b73b;
  font-size: 7px;
  line-height: 1.7;
  text-align: center;
}

.story-title {
  color: #8bd450;
  font-size: 10px;
  line-height: 1.7;
  text-align: center;
}

.story-body {
  overflow-y: auto;
  padding: 8px 6px;
  color: #fff7df;
  font-size: 7px;
  line-height: 2;
  white-space: pre-wrap;
  scrollbar-color: #5a8a3c #101820;
}

.story-button {
  align-self: center;
  min-width: 142px;
  padding: 11px 14px;
  border: 2px solid #255f34;
  border-radius: 8px;
  background: #0d1f10;
  color: #b8ff88;
  font-family: "Press Start 2P", monospace;
  font-size: 7px;
  cursor: pointer;
}

.story-button:hover {
  border-color: #f4b73b;
  color: #f4b73b;
}

.shop-side-panel {
  position: fixed;
  top: 50%;
  left: calc(50% + 232px);
  width: 300px;
  max-height: min(650px, calc(100vh - 32px));
  display: none;
  flex-direction: column;
  gap: 10px;
  padding: 14px;
  transform: translateY(-50%);
  border: 3px solid #5a8a3c;
  border-radius: 14px;
  background: rgba(20, 12, 8, 0.97);
  color: #b8ff88;
  font-family: "Press Start 2P", monospace;
  box-shadow: 0 16px 36px rgba(0, 0, 0, 0.48);
  z-index: 64;
}

.shop-side-panel.open {
  display: flex;
}

.shop-panel-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
  padding-bottom: 8px;
  border-bottom: 1px solid #3c5d2e;
}

.shop-panel-title {
  color: #f4b73b;
  font-size: 8px;
  line-height: 1.6;
}

.shop-panel-close {
  width: 28px;
  height: 28px;
  border: 0;
  border-radius: 7px;
  background: #e04a4a;
  color: #fff;
  font-family: "Press Start 2P", monospace;
  font-size: 8px;
  cursor: pointer;
}

.shop-panel-coins {
  color: #f4b73b;
  font-size: 7px;
  line-height: 1.7;
  text-align: center;
}

.shop-panel-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  overflow-y: auto;
  padding-right: 2px;
}

.shop-panel-grid .shop-item {
  min-height: 88px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  border-radius: 8px;
}

.shop-panel-grid .shop-item.disabled {
  opacity: 0.48;
  cursor: not-allowed;
}

.minigame-choice-row {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

.minigame-choice {
  padding: 10px 8px;
  border: 2px solid #255f34;
  border-radius: 8px;
  background: #0d1f10;
  color: #b8ff88;
  font-family: "Press Start 2P", monospace;
  font-size: 6px;
  line-height: 1.8;
  cursor: pointer;
}

#minigameModal .modal-body {
  align-items: stretch !important;
  overflow-y: hidden;
}

#mgBtns {
  width: 100%;
  align-self: stretch;
}

.minigame-choice:hover {
  border-color: #f4b73b;
  color: #f4b73b;
}

.seed-arena {
  position: relative;
  width: min(308px, 100%);
  height: 160px;
  margin: 0 auto;
  overflow: hidden;
  border: 2px solid #255f34;
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(33, 72, 43, 0.92), rgba(8, 25, 12, 0.96));
}

.seed-target {
  position: absolute;
  width: 26px;
  height: 30px;
  border: 2px solid #5a3816;
  border-radius: 60% 60% 60% 18%;
  background: radial-gradient(circle at 35% 30%, #fff0a4 0 15%, #f4b73b 16% 54%, #d87d29 55% 100%);
  color: transparent;
  font-size: 0;
  cursor: pointer;
  image-rendering: pixelated;
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.45));
  transform: rotate(-32deg);
}

.seed-target::after {
  content: "";
  position: absolute;
  top: -8px;
  left: 13px;
  width: 9px;
  height: 12px;
  border-radius: 8px 8px 0 8px;
  background: #72d35c;
  border: 2px solid #255f34;
  transform: rotate(42deg);
}

.quiz-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
}

.quiz-buttons button {
  min-height: 38px;
  border: 2px solid #255f34;
  border-radius: 8px;
  background: #0d1f10;
  color: #b8ff88;
  font-family: "Press Start 2P", monospace;
  font-size: 7px;
  cursor: pointer;
}

.quiz-buttons button:hover {
  border-color: #f4b73b;
}

.trash-bit {
  position: absolute;
  width: 28px;
  height: 28px;
  opacity: 0;
  font-size: 19px;
  line-height: 28px;
  text-align: center;
  transform: translateY(-6px) scale(0.85);
  transition: opacity 0.55s steps(4), transform 0.55s steps(4);
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.42));
}

.trash-bit.visible {
  opacity: 0.95;
  transform: translateY(0) scale(1);
}

.trash-bit.cleaning {
  opacity: 0;
  transform: translateY(8px) scale(0.7);
}

.btn.disabled {
  opacity: 0.4;
  pointer-events: auto;
}

@media (max-width: 850px) {
  body.quindochi-enhanced {
    align-items: center;
    justify-content: center;
    padding: 10px 8px 190px;
  }

  .shop-side-panel {
    top: auto;
    left: 12px;
    right: 12px;
    bottom: 10px;
    width: auto;
    max-height: 178px;
    transform: none;
  }

  .shop-panel-grid {
    grid-template-columns: repeat(4, minmax(88px, 1fr));
    overflow-x: auto;
    overflow-y: hidden;
  }

  .shop-panel-grid .shop-item {
    min-height: 74px;
  }
}

  }

    width: min(360px, calc(100vw - 12px));

  }

    padding: 2px 4px;
    gap: 8px;
  }

  .device-top .title {
    font-size: clamp(6px, 2.2vw, 8px);

  }

  .device-top .info-bar {
    font-size: clamp(6px, 2vw, 7px);
    white-space: nowrap;
  }

  .screen-wrap {
    border-radius: 13px;
  }

  .screen-pet.life-egg {
    height: 39%;
    bottom: 26%;
  }

  .screen-pet.life-baby {
    height: 55%;
    bottom: 3%;
  }

  .screen-pet.life-child {
    height: 62%;
    bottom: 1%;
  }

  .screen-pet.life-adult {
    height: 67%;
  }

  .screen-pet.life-transcend {
    height: 72%;
  }

  .stats {
    gap: 5px;
    padding: 0 2px;
  }

  .stat-label,
  .age-label,

class SoundBoard {
  constructor(paths) {
    this._paths = paths;
    this._enabled = true;
  }

  play(name) {
    const path = this._paths[name];
    if (!path || !this._enabled) return;
    try {
      const audio = new Audio(assetUrl(path));
      audio.volume = 0.58;
      const result = audio.play();
      if (result && typeof result.catch === "function") result.catch(() => {});
    } catch (_) {}
  }
}

class LocalStateStore {
  constructor(key = SAVE_KEY) {
    this.key = key;
  }

  load() {
    try {
      const raw = window.localStorage.getItem(this.key);
      if (!raw) return null;
      const payload = JSON.parse(raw);
      if (!payload || payload.version !== SAVE_VERSION || !payload.state) return null;
      return payload.state;
    } catch (_) {
      return null;
    }
  }

  save(state) {
    try {
      const payload = {
        version: SAVE_VERSION,
        savedAt: Date.now(),
        state: state.toJSON()
      };
      window.localStorage.setItem(this.key, JSON.stringify(payload));
    } catch (_) {}
  }

  clear() {
    try {
      window.localStorage.removeItem(this.key);
    } catch (_) {}
  }
}

class StoryModal {
  constructor() {
    this._el = null;
    this._button = null;
    this._onContinue = null;
    this._ensure();
  }

  _ensure() {
    let overlay = document.getElementById("storyOverlay");
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.id = "storyOverlay";
      overlay.className = "story-overlay";
      overlay.innerHTML = `
        <div class="story-box" role="dialog" aria-modal="true" aria-labelledby="storyTitle">
          <div class="story-kicker" id="storyKicker"></div>
          <h2 class="story-title" id="storyTitle"></h2>
          <div class="story-body" id="storyBody"></div>
          <button class="story-button" id="storyContinue" type="button">CONTINUAR</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }
    this._el = overlay;
    this._button = document.getElementById("storyContinue");
    this._button.addEventListener("click", () => this._continue());
  }

  show(part, onContinue) {
    this._onContinue = onContinue;
    document.getElementById("storyKicker").textContent = part.kicker || "El Espíritu de Ambato";
    document.getElementById("storyTitle").textContent = part.title || "";
    document.getElementById("storyBody").textContent = part.body || "";
    this._el.classList.add("open");
    setTimeout(() => this._button.focus(), 40);
  }

  _continue() {
    this._el.classList.remove("open");
    const next = this._onContinue;
    this._onContinue = null;
    if (next) next();
  }
}

  _ensureDynamicPanels() {
    document.body.classList.add("quindochi-enhanced");
    let panel = document.getElementById("shopSidePanel");
    if (!panel) {
      panel = document.createElement("aside");
      panel.id = "shopSidePanel";
      panel.className = "shop-side-panel";
      panel.innerHTML = `
        <div class="shop-panel-head">
          <div class="shop-panel-title">TIENDA</div>
          <button class="shop-panel-close" id="shopPanelClose" type="button">×</button>
        </div>
        <div class="shop-panel-coins"><span id="shopPanelCoins">0</span> monedas</div>
        <div class="shop-panel-grid" id="sideShopGrid"></div>
      `;
      document.body.appendChild(panel);
    }
    this._shopPanel = panel;
    this._shopGrid = document.getElementById("sideShopGrid");
    this._shopCoins = document.getElementById("shopPanelCoins");
    this._shopClose = document.getElementById("shopPanelClose");
  }

  get minigameEls() {
    return {
      modal: this._els.minigameModal,
      prompt: this._els.mgPrompt,
      buttons: this._els.mgBtns,
      result: this._els.mgResult,
      score: this._els.mgScore
    };
  }

  currentMoment() {
    const hour = this.currentTime().getHours();
    if (hour >= 6 && hour < 17) return "day";
    if (hour >= 17 && hour < 20) return "sunset";
    return "night";
  }

  currentTime() {
    const now = new Date();
    if (!this._timeOverride) return now;
    now.setHours(this._timeOverride.hour, this._timeOverride.minute, 0, 0);
    return now;
  }

  updateClock() {
    const now = this.currentTime();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    this._els.clock.textContent = `${hh}:${mm}`;
  }

  setTimeOverride(hour, minute = 0) {
    if (!Number.isInteger(hour) || hour < 0 || hour > 23) {
      throw new Error("Hora inválida. Usa settime HH o settime HH:MM.");
    }
    if (!Number.isInteger(minute) || minute < 0 || minute > 59) {
      throw new Error("Minutos inválidos. Usa settime HH:MM.");
    }
    this._timeOverride = { hour, minute };
    this.updateClock();
    this.updateSky();
    this.updateBackground();
    return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
  }

  clearTimeOverride() {
    this._timeOverride = null;
    this.updateClock();
    this.updateSky();
    this.updateBackground();
  }

  updateSky() {
    const body = document.body;
    body.classList.remove("sky-day", "sky-afternoon", "sky-evening", "sky-night", "sky-dawn");
    const moment = this.currentMoment();
    body.classList.add(moment === "day" ? "sky-day" : moment === "sunset" ? "sky-afternoon" : "sky-night");
  }

  updateBackground() {
    const key = this._state.shopOpen ? "fair" : this.currentMoment();
    const path = ASSET_PATHS.backgrounds[key] || ASSET_PATHS.backgrounds.day;
    this._els.screenBg.style.backgroundImage = `url("${assetUrl(path)}")`;
    this._els.screenBg.style.opacity = this._state.shopOpen ? "0.98" : "0.9";
  }

  updateStats() {
    const s = this._state;
    const set = (valueEl, barEl, value) => {
      const safe = Math.round(clamp(value));
      valueEl.textContent = safe;
      barEl.style.width = `${safe}%`;
    };
    set(this._els.hungerVal, this._els.hungerBar, s.hunger);
    set(this._els.happyVal, this._els.happyBar, s.happiness);
    set(this._els.energyVal, this._els.energyBar, s.energy);
    set(this._els.healthVal, this._els.healthBar, s.health);

    const ageInfo = s.getAgeInfo();
    this._els.ageBar.style.width = `${ageInfo.progress}%`;
    this._els.ageNum.textContent = ageInfo.label;
    this._els.coinsTop.textContent = Math.max(0, Math.floor(s.coins));
    if (this._els.coinsShop) this._els.coinsShop.textContent = Math.max(0, Math.floor(s.coins));
    if (this._shopCoins) this._shopCoins.textContent = Math.max(0, Math.floor(s.coins));
  }

  setInputLocked(locked) {
    document.querySelectorAll(".btn").forEach((btn) => {
      btn.classList.toggle("disabled", locked);
      btn.setAttribute("aria-disabled", locked ? "true" : "false");
    });
  }

  say(text, duration = 2600) {
    clearTimeout(this._sayTimer);
    this._els.bubble.textContent = text;
    this._els.bubble.classList.add("show");
    if (duration > 0) {
      this._sayTimer = setTimeout(() => this._els.bubble.classList.remove("show"), duration);
    }
  }

  log(text) {
    this._els.log.textContent = text;
  }

  openMinigameModal() {
    this._els.minigameModal.classList.add("open");
  }

  closeMinigameModal() {
    this._els.minigameModal.classList.remove("open");
  }

  openShopPanel(items, coins, onBuy, onClose) {
    this._shopClose.onclick = onClose;
    this._shopCoins.textContent = Math.floor(coins);
    this._shopGrid.innerHTML = "";
    items.forEach((item) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `shop-item${coins < item.cost ? " disabled" : ""}`;
      button.innerHTML = `
        <div class="item-icon">${item.icon}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-cost">🪙 ${item.cost}</div>
      `;
      button.addEventListener("click", () => onBuy(item.id));
      this._shopGrid.appendChild(button);
    });
    this._shopPanel.classList.add("open");
  }

  rerenderShop(items, coins, onBuy) {
    if (!this._shopPanel.classList.contains("open")) return;
    this.openShopPanel(items, coins, onBuy, this._shopClose.onclick);
  }

  closeShopPanel() {
    this._shopPanel.classList.remove("open");
  }

  playCleanFx() {
    const layer = this._els.cleaningLayer;
    if (!layer) return;
    layer.innerHTML = `
      <div class="cleaning-can"></div>
      <div class="clean-shine"></div>
      <div class="clean-drop" style="left:52%;animation-delay:0s"></div>
      <div class="clean-drop" style="left:59%;animation-delay:0.16s"></div>
      <div class="clean-drop" style="left:66%;animation-delay:0.32s"></div>
    `;
    layer.classList.add("active");
    setTimeout(() => {
      layer.classList.remove("active");
      layer.innerHTML = "";
    }, 1500);
  }
}

class SpriteAnimator {
  constructor(img) {
    this._img = img;
    this._key = "";
    this._frames = [];
    this._frameIndex = 0;
    this._timer = null;
  }

  play(stage, mood, eggPhase = "idle") {
    const frames = this._resolveFrames(stage, mood, eggPhase);
    const key = `${stage}:${mood}:${eggPhase}:${frames.join("|")}`;
    this._img.className = `screen-pet life-${stage}`;
    if (stage === "egg" && eggPhase === "shaking") this._img.classList.add("egg-shaking");
    if (mood === "dead") this._img.classList.add("pet-dead");
    if (key === this._key) return;

    this._key = key;
    this._frames = frames;
    this._frameIndex = 0;
    clearInterval(this._timer);
    this._setFrame();
    if (frames.length > 1) {
      this._timer = setInterval(() => this._advance(), stage === "transcend" ? 620 : 520);
    }
  }

  _resolveFrames(stage, mood, eggPhase) {
    if (stage === "egg") {
      return eggPhase === "hatched" ? ASSET_PATHS.sprites.egg.hatched : ASSET_PATHS.sprites.egg.intact;
    }
    if (stage === "transcend") return ASSET_PATHS.sprites.transcend.idle;
    const set = ASSET_PATHS.sprites[stage] || ASSET_PATHS.sprites.baby;
    return set[mood] || set.idle;
  }

  _setFrame() {
    const frame = this._frames[this._frameIndex] || this._frames[0];
    if (frame) this._img.src = assetUrl(frame);
  }

  _advance() {
    this._frameIndex = (this._frameIndex + 1) % this._frames.length;
    this._setFrame();
  }
}

class TrashManager {
  constructor(layer) {
    this._layer = layer;
    this._positions = [
      { left: "16%", top: "74%", icon: "🥤" },
      { left: "70%", top: "78%", icon: "🧻" },
      { left: "54%", top: "71%", icon: "🍂" },
      { left: "83%", top: "66%", icon: "🥫" }
    ];
  }

  update(dirty) {
    if (!this._layer) return;
    const needed = dirty >= 78 ? 4 : dirty >= 56 ? 3 : dirty >= 34 ? 2 : dirty >= 16 ? 1 : 0;
    while (this._layer.children.length < needed) {
      const info = this._positions[this._layer.children.length % this._positions.length];
      const el = document.createElement("div");
      el.className = "trash-bit";
      el.textContent = info.icon;
      el.style.left = info.left;
      el.style.top = info.top;
      this._layer.appendChild(el);
      requestAnimationFrame(() => el.classList.add("visible"));
    }
    while (this._layer.children.length > needed) this._layer.lastElementChild.remove();
  }

  clearAnimated() {
    if (!this._layer) return;
    Array.from(this._layer.children).forEach((el) => el.classList.add("cleaning"));
    setTimeout(() => (this._layer.innerHTML = ""), 850);
  }

  clear() {
    if (this._layer) this._layer.innerHTML = "";
  }
}

class GameState {
  constructor() {
    this.reset();
  }

  reset() {
    this.stage = "egg";
    this.stageStartedAt = 0;
    this.eggStartedAt = 0;
    this.eggPhase = "intact";
    this.eggCracked = false;
    this.isStoryOpen = false;
    this.isDead = false;
    this.isTranscendent = false;
    this.shopOpen = false;
    this.hunger = 100;
    this.happiness = 100;
    this.energy = 100;
    this.health = 100;
    this.coins = 0;
    this.dirty = 0;
    this.actionState = "idle";
    this.actionUntil = 0;
    this._coinAccumulator = 0;
    this._hungrySoundReady = true;
  }

  toJSON() {
    return {
      stage: this.stage,
      stageStartedAt: this.stageStartedAt,
      eggStartedAt: this.eggStartedAt,
      eggPhase: this.eggPhase,
      eggCracked: this.eggCracked,
      isDead: this.isDead,
      isTranscendent: this.isTranscendent,
      hunger: this.hunger,
      happiness: this.happiness,
      energy: this.energy,
      health: this.health,
      coins: this.coins,
      dirty: this.dirty,
      actionState: this.actionState,
      actionUntil: this.actionUntil,
      coinAccumulator: this._coinAccumulator
    };
  }

  restore(data) {
    this.reset();
    if (!data || typeof data !== "object") return false;

    const stage = LIFE_STAGES[data.stage] ? data.stage : "egg";
    this.stage = stage;
    this.stageStartedAt = Number.isFinite(data.stageStartedAt) ? data.stageStartedAt : Date.now();
    this.eggStartedAt = Number.isFinite(data.eggStartedAt) ? data.eggStartedAt : 0;
    this.eggPhase = ["intact", "shaking", "hatched"].includes(data.eggPhase) ? data.eggPhase : "intact";
    this.eggCracked = Boolean(data.eggCracked);
    this.isDead = Boolean(data.isDead);
    this.isTranscendent = Boolean(data.isTranscendent || stage === "transcend");
    this.shopOpen = false;
    this.isStoryOpen = false;
    this.hunger = clamp(Number(data.hunger ?? 100));
    this.happiness = clamp(Number(data.happiness ?? 100));
    this.energy = clamp(Number(data.energy ?? 100));
    this.health = clamp(Number(data.health ?? 100));
    this.coins = Math.max(0, Math.floor(Number(data.coins ?? 0)));
    this.dirty = clamp(Number(data.dirty ?? 0));
    this.actionState = typeof data.actionState === "string" ? data.actionState : "idle";
    this.actionUntil = Number.isFinite(data.actionUntil) ? data.actionUntil : 0;
    this._coinAccumulator = clamp(Number(data.coinAccumulator ?? 0), 0, 59000);
    this._hungrySoundReady = this.hunger > 20;

    if (this.actionUntil <= Date.now()) {
      this.actionState = "idle";
      this.actionUntil = 0;
    }
    if (this.stage !== "egg") {
      this.eggPhase = "intact";
      this.eggCracked = false;
    }
    if (this.stage === "egg" && !this.eggStartedAt) {
      this.eggStartedAt = Date.now();
      this.stageStartedAt = Date.now();
      this.eggPhase = "shaking";
    }
    return true;
  }

  get stageConfig() {
    return LIFE_STAGES[this.stage] || LIFE_STAGES.baby;
  }

  getAgeInfo(now = Date.now()) {
    if (this.stage === "egg") {
      const elapsed = this.eggStartedAt ? clamp(now - this.eggStartedAt, 0, LIFE_STAGES.egg.durationMs) : 0;
      return { age: 0, label: "0 años", progress: Math.max(1, (elapsed / LIFE_STAGES.egg.durationMs) * 2.5) };
    }
    if (this.stage === "transcend") return { age: 40, label: "40 años", progress: 100 };

    const cfg = this.stageConfig;
    const elapsed = clamp(now - this.stageStartedAt, 0, cfg.durationMs);
    const fraction = cfg.durationMs ? elapsed / cfg.durationMs : 0;
    const age = cfg.minAge + (cfg.maxAge - cfg.minAge) * fraction;
    const wholeAge = Math.floor(age);
    return {
      age,
      label: `${wholeAge} año${wholeAge === 1 ? "" : "s"}`,
      progress: clamp((age / 40) * 100)
    };
  }

  adjust(values) {
    Object.keys(values).forEach((key) => {
      this[key] = clamp((this[key] || 0) + values[key]);
    });
  }

  setStat(name, value) {
    if (!["hunger", "happiness", "energy", "health"].includes(name)) return false;
    this[name] = clamp(value);
    return true;
  }

  setTemporaryState(name, duration = 2200) {
    this.actionState = name;
    this.actionUntil = Date.now() + duration;
  }

  mood(now = Date.now()) {
    if (this.isDead) return "dead";
    if (this.stage === "egg") return "idle";
    if (this.stage === "transcend") return "idle";
    if (this.actionState !== "idle" && now < this.actionUntil) return this.actionState;
    this.actionState = "idle";
    if (this.hunger <= 20) return "hungry";
    if (this.energy <= 20) return "drowsy";
    if (this.happiness <= 20) return "sad";
    if (this.health <= 32) return "sad";
    if (this.dirty >= 82) return "angry";
    return "idle";
  }
}

class ShopManager {
  constructor(game, ui, sound) {
    this._game = game;
    this._ui = ui;
    this._sound = sound;
    this.items = [
      { id: "pizza", icon: "🍕", name: "Pizza Especial", cost: 4, apply: (s) => { s.adjust({ hunger: 34, happiness: 4 }); this._sound.play("eating"); } },
      { id: "toy", icon: "🎁", name: "Juguete Nuevo", cost: 6, apply: (s) => s.adjust({ happiness: 32, energy: -5 }) },
      { id: "vitamins", icon: "💊", name: "Vitaminas", cost: 5, apply: (s) => s.adjust({ health: 32 }) },
      { id: "energy", icon: "⚡", name: "Bebida Energía", cost: 7, apply: (s) => s.adjust({ energy: 40, health: -4 }) }
    ];
  }

  open() {
    const s = this._game.state;
    s.shopOpen = true;
    this._ui.updateBackground();
    this._render();
    this._ui.log("La feria está abierta. Quindochi mira los puestos contigo.");
    this._ui.say("¡Llegamos a la feria!");
  }

  close() {
    const s = this._game.state;
    s.shopOpen = false;
    this._ui.closeShopPanel();
    this._ui.updateBackground();
    this._ui.log("Quindochi volvió de la feria.");
  }

  _render() {
    const s = this._game.state;
    this._ui.openShopPanel(this.items, s.coins, (id) => this.buy(id), () => this.close());
  }

  buy(id) {
    const s = this._game.state;
    const item = this.items.find((candidate) => candidate.id === id);
    if (!item) return;
    if (s.coins < item.cost) {
      this._ui.say("No alcanza todavía.");
      this._ui.log(`Necesitas ${item.cost} monedas para ${item.name}.`);
      return;
    }
    s.coins -= item.cost;
    item.apply(s);
    s.setTemporaryState(item.id === "toy" ? "euphoric" : "eating", 1700);
    this._ui.say(`${item.name} comprado.`);
    this._ui.log(`Compraste ${item.name}.`);
    this._game.refresh();
    this._render();
  }
}

class MinigameManager {
  constructor(game, ui, sound) {
    this._game = game;
    this._ui = ui;
    this._sound = sound;
    this._seedTimer = null;
    this._seedCountdown = null;
  }

  openSelector() {
    const els = this._ui.minigameEls;
    this._clearTimers();
    els.prompt.textContent = "Elige un minijuego";
    els.result.textContent = "";
    els.score.textContent = "Premio: 5 o 10 monedas";
    els.buttons.removeAttribute("style");
    els.buttons.className = "minigame-choice-row";
    els.buttons.innerHTML = `
      <button class="minigame-choice" type="button" data-game="math">Matemáticas · 5 monedas</button>
      <button class="minigame-choice" type="button" data-game="seed">Atrapa semillas · 10 monedas</button>
    `;
    els.buttons.querySelector('[data-game="math"]').addEventListener("click", () => this._startMath());
    els.buttons.querySelector('[data-game="seed"]').addEventListener("click", () => this._startSeeds());
    this._ui.openMinigameModal();
  }

  close() {
    this._clearTimers();
    this._ui.closeMinigameModal();
  }

  _startMath() {
    const els = this._ui.minigameEls;
    const quiz = { round: 0, score: 0, total: 3 };
    els.buttons.removeAttribute("style");
    els.buttons.className = "quiz-buttons";
    els.result.textContent = "";

    const nextQuestion = () => {
      if (quiz.round >= quiz.total) {
        this._game.reward("math", 5);
        els.prompt.textContent = "Ronda terminada";
        els.result.textContent = `Aciertos: ${quiz.score}/${quiz.total}. +5 monedas`;
        els.score.textContent = `Monedas: ${this._game.state.coins}`;
        els.buttons.className = "minigame-choice-row";
        els.buttons.innerHTML = `<button class="minigame-choice" type="button" data-close="1">Cerrar</button>`;
        els.buttons.querySelector("[data-close]").addEventListener("click", () => this.close());
        return;
      }

      quiz.round += 1;
      const a = Math.floor(Math.random() * 8) + 2;
      const b = Math.floor(Math.random() * 8) + 1;
      const op = ["+", "-", "×"][Math.floor(Math.random() * 3)];
      const answer = op === "+" ? a + b : op === "-" ? a - b : a * b;
      const choices = new Set([answer]);
      while (choices.size < 4) choices.add(answer + Math.floor(Math.random() * 9) - 4);
      const shuffled = Array.from(choices).sort(() => Math.random() - 0.5);

      els.prompt.textContent = `${a} ${op} ${b} = ?`;
      els.score.textContent = `Pregunta ${quiz.round}/${quiz.total} · Aciertos ${quiz.score}`;
      els.buttons.innerHTML = "";
      shuffled.forEach((choice) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = choice;
        btn.addEventListener("click", () => {
          if (choice === answer) {
            quiz.score += 1;
            els.result.textContent = "Correcto";
            this._sound.play("advance");
          } else {
            els.result.textContent = `Era ${answer}`;
            this._sound.play("lose");
          }
          setTimeout(nextQuestion, 520);
        });
        els.buttons.appendChild(btn);
      });
    };

    nextQuestion();
  }

  _startSeeds() {
    const els = this._ui.minigameEls;
    const game = { caught: 0, time: 12 };
    els.prompt.textContent = "Atrapa semillas";
    els.result.textContent = "";
    els.score.textContent = "Tiempo: 12 · Semillas: 0";
    els.buttons.style.width = "100%";
    els.buttons.style.display = "block";
    els.buttons.className = "";
    els.buttons.innerHTML = `<div class="seed-arena" id="seedArena"></div>`;
    const arena = document.getElementById("seedArena");

    const spawn = () => {
      if (!arena) return;
      const seed = document.createElement("button");
      seed.type = "button";
      seed.className = "seed-target";
      seed.textContent = "✦";
      seed.style.left = `${Math.floor(Math.random() * 82) + 4}%`;
      seed.style.top = `${Math.floor(Math.random() * 66) + 10}%`;
      seed.addEventListener("click", () => {
        game.caught += 1;
        this._sound.play("advance");
        seed.remove();
        spawn();
        els.score.textContent = `Tiempo: ${game.time} · Semillas: ${game.caught}`;
      });
      arena.appendChild(seed);
      setTimeout(() => seed.remove(), 1450);
    };

    spawn();
    this._seedTimer = setInterval(spawn, 760);
    this._seedCountdown = setInterval(() => {
      game.time -= 1;
      els.score.textContent = `Tiempo: ${game.time} · Semillas: ${game.caught}`;
      if (game.time <= 0) {
        this._clearTimers();
        this._game.reward("seed", 10);
        if (game.caught < 6) this._sound.play("lose");
        els.prompt.textContent = "Semillas guardadas";
        els.result.textContent = `Atrapaste ${game.caught}. +10 monedas`;
        els.score.textContent = `Monedas: ${this._game.state.coins}`;
        els.buttons.className = "minigame-choice-row";
        els.buttons.innerHTML = `<button class="minigame-choice" type="button" data-close="1">Cerrar</button>`;
        els.buttons.querySelector("[data-close]").addEventListener("click", () => this.close());
      }
    }, 1000);
  }

  _clearTimers() {
    clearInterval(this._seedTimer);
    clearInterval(this._seedCountdown);
    this._seedTimer = null;
    this._seedCountdown = null;
  }
}

class DevConsole {
  constructor(game) {
    this._game = game;
    this._el = null;
    this._history = null;
    this._input = null;
  }

  init() {
    this._ensure();
    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (event.ctrlKey && event.shiftKey && key === "d") {
        event.preventDefault();
        this.toggle();
      }
      if (event.key === "`") {
        event.preventDefault();
        this.toggle();
      }
    });
  }

  _ensure() {
    let panel = document.getElementById("devConsole");
    if (!panel) {
      panel = document.createElement("div");
      panel.id = "devConsole";
      panel.className = "dev-console";
      panel.innerHTML = `
        <div class="dev-console-title">DEV CONSOLE</div>
        <div class="dev-console-history" id="devConsoleHistory"></div>
        <form class="dev-console-form" id="devConsoleForm">
          <span class="dev-console-prompt">&gt;</span>
          <input class="dev-console-input" id="devConsoleInput" autocomplete="off" spellcheck="false">
        </form>
      `;
      document.body.appendChild(panel);
    }
    this._el = panel;
    this._history = document.getElementById("devConsoleHistory");
    this._input = document.getElementById("devConsoleInput");
    document.getElementById("devConsoleForm").addEventListener("submit", (event) => {
      event.preventDefault();
      this._submitCurrent();
    });
    this._input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        this._submitCurrent();
      }
    });
  }

  _submitCurrent() {
    const command = this._input.value.trim();
    this._input.value = "";
    if (command) this.run(command);
  }

  toggle() {
    this._el.classList.toggle("open");
    if (this._el.classList.contains("open")) {
      this._input.focus();
      this._write("help | setage | setstage | settime | realtime | sethunger | setenergy | sethappiness | sethealth | addcoins | setstate | kill | reset");
    }
  }

  run(raw) {
    this._write(`> ${raw}`);
    const [command, ...rest] = raw.split(/\s+/);
    const value = rest.join(" ");
    const num = Number(rest[0]);
    try {
      switch ((command || "").toLowerCase()) {
        case "help":
          this._write("Comandos: setage 14, setstage adult, settime 18:30, realtime, sethunger 0, setenergy 100, sethappiness 50, sethealth 0, addcoins 10, setstate hungry, kill, reset");
          break;
        case "settime":
        case "sethour":
          this._write(`Hora de prueba: ${this._game.setTime(value || rest[0] || "")}`);
          break;
        case "realtime":
        case "cleartime":
          this._game.useRealTime();
          this._write("Hora real restaurada.");
          break;
        case "setage":
          this._game.setAge(Number.isFinite(num) ? num : 0);
          this._write(`Edad forzada: ${num}`);
          break;
        case "setstage":
          this._game.setStage(value);
          this._write(`Etapa forzada: ${value}`);
          break;
        case "sethunger":
          this._game.setStat("hunger", num);
          break;
        case "setenergy":
          this._game.setStat("energy", num);
          break;
        case "sethappiness":
        case "sethappy":
          this._game.setStat("happiness", num);
          break;
        case "sethealth":
          this._game.setStat("health", num);
          break;
        case "addcoins":
          this._game.addCoins(Number.isFinite(num) ? num : 0);
          break;
        case "setstate":
          this._game.forceState(value || "idle");
          break;
        case "kill":
          this._game.kill();
          break;
        case "reset":
          this._game.reset();
          break;
        default:
          this._write("Comando no reconocido", true);
      }
      this._game.refresh();
    } catch (error) {
      this._write(error.message || String(error), true);
    }
  }

  _write(text, error = false) {
    const line = document.createElement("div");
    line.className = `dev-console-line${error ? " error" : ""}`;
    line.textContent = text;
    this._history.appendChild(line);
    this._history.scrollTop = this._history.scrollHeight;
  }
}

class Quindochi {
  constructor() {
    this.state = new GameState();
    this._saveStore = new LocalStateStore();
    this._sound = new SoundBoard(ASSET_PATHS.sounds);
    this._story = new StoryModal();
    this._ui = new UIManager(this.state);
    this._sprites = new SpriteAnimator(document.getElementById("petSprite"));
    this._trash = new TrashManager(document.getElementById("trashLayer"));
    this._shop = new ShopManager(this, this._ui, this._sound);
    this._minigames = new MinigameManager(this, this._ui, this._sound);
    this._devConsole = new DevConsole(this);
    this._transitionTimer = null;
    this._transitioning = false;
    this._saveEnabled = false;
  }

  init() {
    const loaded = this.state.restore(this._saveStore.load());
    this._devConsole.init();
    this._ui.updateClock();
    this._ui.updateSky();
    this._ui.updateBackground();
    if (loaded) {
      this._saveEnabled = true;
      this._ui.log("Progreso cargado desde este navegador.");
      this._ui.say("Progreso cargado.", 1800);
      this.refresh();
      this._resumeLoadedState();
    } else {
      this._saveEnabled = false;
      this.refresh();
      this._showStory(0, () => this._beginEgg());
    }
    setInterval(() => this._tick(), 1000);
    setInterval(() => {
      this._ui.updateClock();
      this._ui.updateSky();
      this._ui.updateBackground();
    }, 30000);
  }

  reset() {
    clearTimeout(this._transitionTimer);
    this._transitioning = false;
    this._saveEnabled = false;
    this._saveStore.clear();
    this.state.reset();
    this._trash.clear();
    this._shop.close();
    this._minigames.close();
    this._ui.say("El ciclo vuelve a empezar.");
    this._ui.log("Quindochi espera dentro del huevo.");
    this.refresh();
    this._showStory(0, () => this._beginEgg());
  }

  refresh() {
    const s = this.state;
    this._ui.updateStats();
    this._ui.updateSky();
    this._ui.updateBackground();
    this._trash.update(s.dirty);
    this._sprites.play(s.stage, s.mood(), s.eggPhase);
    this._ui.setInputLocked(s.isStoryOpen || s.stage === "egg" || s.isDead || s.isTranscendent);
    this._saveProgress();
  }

  _saveProgress() {
    if (!this._saveEnabled) return;
    this._saveStore.save(this.state);
  }

  _resumeLoadedState() {
    const s = this.state;
    if (s.isDead) {
      this._ui.say("Quindochi ha muerto.", 0);
      this._ui.log("Progreso cargado: Quindochi está muerto. Usa reset para empezar de nuevo.");
      return;
    }
    if (s.isTranscendent) {
      this._ui.say("Quindochi trascendió.", 0);
      this._ui.log("Progreso cargado: el ciclo ya terminó.");
      return;
    }
    if (s.stage === "egg") {
      if (s.eggCracked || s.eggPhase === "hatched") {
        s.eggCracked = true;
        s.eggPhase = "hatched";
        this.refresh();
        this._transitionTimer = setTimeout(() => {
          this._showStory(LIFE_STAGES.baby.storyIndex, () => this._enterStage("baby"));
        }, 700);
      } else {
        s.eggPhase = "shaking";
        this._ui.say("El huevo sigue vibrando...");
        this._ui.log("Progreso cargado: el huevo continúa eclosionando.");
      }
      return;
    }
    this._checkDeath();
    if (!s.isDead) this._checkStageProgress();
  }

  _tick() {
    const s = this.state;
    this._ui.updateClock();
    this._ui.updateSky();
    this._ui.updateBackground();

    if (s.isStoryOpen || s.isDead || s.isTranscendent) {
      this.refresh();
      return;
    }

    if (s.stage === "egg") {
      this._updateEgg();
      this.refresh();
      return;
    }

    this._decayStats();
    this._awardMinuteCoin();
    this._checkDeath();
    if (s.isDead) {
      this.refresh();
      return;
    }
    this._checkHungrySound();
    this._checkStageProgress();
    this.refresh();
  }

  _showStory(index, onContinue) {
    const s = this.state;
    s.isStoryOpen = true;
    this._ui.setInputLocked(true);
    this._story.show(STORY_PARTS[index], () => {
      s.isStoryOpen = false;
      this._ui.setInputLocked(false);
      if (onContinue) onContinue();
      this.refresh();
    });
  }

  _beginEgg() {
    const s = this.state;
    this._saveEnabled = true;
    s.stage = "egg";
    s.stageStartedAt = Date.now();
    s.eggStartedAt = Date.now();
    s.eggPhase = "shaking";
    s.eggCracked = false;
    this._ui.say("El huevo vibra...");
    this._ui.log("El huevo dorado empieza a moverse.");
    this.refresh();
  }

  _updateEgg() {
    const s = this.state;
    const elapsed = Date.now() - s.eggStartedAt;
    if (elapsed >= 6000 && !s.eggCracked) {
      s.eggCracked = true;
      s.eggPhase = "hatched";
      this._sound.play("crack");
      this._ui.say("¡La cáscara se rompió!", 2200);
      this._ui.log("Quindochi apareció por primera vez.");
      this.refresh();
      this._transitionTimer = setTimeout(() => {
        this._showStory(LIFE_STAGES.baby.storyIndex, () => this._enterStage("baby"));
      }, 2000);
    }
  }

  _enterStage(stage) {
    const s = this.state;
    s.isDead = false;
    s.stage = stage;
    s.stageStartedAt = Date.now();
    s.eggPhase = "intact";
    s.actionState = "idle";
    s.actionUntil = 0;
    this._transitioning = false;
    if (stage === "transcend") {
      s.isTranscendent = true;
      s.shopOpen = false;
      this._ui.closeShopPanel();
      this._sound.play("grow");
      this._ui.say("Quindochi trascendió.", 0);
      this._ui.log("El ciclo terminó: Quindochi ascendió al Hanan Pacha.");
    } else {
      this._sound.play("grow");
      this._ui.say(`${LIFE_STAGES[stage].label} Quindochi está listo.`);
      this._ui.log(`Nueva etapa: ${LIFE_STAGES[stage].label}.`);
    }
    this.refresh();
  }

  _checkStageProgress() {
    const s = this.state;
    if (this._transitioning) return;
    const cfg = s.stageConfig;
    if (!cfg.next) return;
    if (Date.now() - s.stageStartedAt >= cfg.durationMs) {
      this._transitioning = true;
      const next = cfg.next;
      const storyIndex = LIFE_STAGES[next].storyIndex;
      this._showStory(storyIndex, () => this._enterStage(next));
    }
  }

  _decayStats() {
    const s = this.state;
    s.hunger = clamp(s.hunger - 0.18);
    s.energy = clamp(s.energy - 0.12);
    s.happiness = clamp(s.happiness - 0.1);
    s.dirty = clamp(s.dirty + 0.08);
    if (s.hunger <= 12 || s.energy <= 12 || s.happiness <= 12 || s.dirty >= 86) {
      s.health = clamp(s.health - 0.28);
    } else if (s.health < 100 && s.hunger > 45 && s.energy > 35 && s.happiness > 35 && s.dirty < 55) {
      s.health = clamp(s.health + 0.08);
    }
  }

  _awardMinuteCoin() {
    const s = this.state;
    s._coinAccumulator += 1000;
    if (s._coinAccumulator >= 60000) {
      s._coinAccumulator -= 60000;
      s.coins += 1;
      this._ui.log("Quindochi ganó 1 moneda por el paso del tiempo.");
    }
  }

  _checkDeath() {
    const s = this.state;
    if (s.stage === "egg" || s.stage === "transcend" || s.isDead) return;
    const allMinimum = s.hunger <= 0 && s.energy <= 0 && s.happiness <= 0 && s.health <= 0;
    if (s.health <= 0 || allMinimum) this.kill();
  }

  _checkHungrySound() {
    const s = this.state;
    if (s.hunger <= 20 && s._hungrySoundReady) {
      s._hungrySoundReady = false;
      this._sound.play("hungry");
    }
    if (s.hunger > 36) s._hungrySoundReady = true;
  }

  _canAct(actionName) {
    const s = this.state;
    if (s.isStoryOpen) {
      this._ui.log("Primero continúa la historia.");
      return false;
    }
    if (s.stage === "egg") {
      this._ui.log("El huevo todavía está eclosionando.");
      return false;
    }
    if (s.isDead) {
      this._ui.log("Quindochi murió. Usa reset para empezar de nuevo.");
      return false;
    }
    if (s.isTranscendent) {
      this._ui.log("Quindochi ya trascendió.");
      return false;
    }
    return true;
  }

  feed() {
    if (!this._canAct("feed")) return;
    const s = this.state;
    s.adjust({ hunger: 28, energy: -4, happiness: 3 });
    s.dirty = clamp(s.dirty + 5);
    s.setTemporaryState("eating", 2300);
    this._sound.play("eating");
    this._ui.say("¡Ñam!");
    this._ui.log("Quindochi terminó de comer.");
    this.refresh();
  }

  play() {
    if (!this._canAct("play")) return;
    this._minigames.openSelector();
    this._ui.log("Quindochi eligió jugar.");
  }

  sleep() {
    if (!this._canAct("sleep")) return;
    const s = this.state;
    s.adjust({ energy: 34, hunger: -8, happiness: 2 });
    s.setTemporaryState("sleeping", 3200);
    this._ui.say("Zzz...");
    this._ui.log("Quindochi descansó.");
    this.refresh();
  }

  heal() {
    if (!this._canAct("heal")) return;
    const s = this.state;
    s.adjust({ health: 28, energy: -4 });
    s.setTemporaryState("euphoric", 1800);
    this._ui.say("Se siente mejor.");
    this._ui.log("Quindochi recibió vitaminas y cuidado.");
    this.refresh();
  }

  pet() {
    if (!this._canAct("pet")) return;
    const s = this.state;
    s.adjust({ happiness: 26, health: 3 });
    s.setTemporaryState("euphoric", 2400);
    this._sound.play("pet");
    this._ui.say("¡Qué cariño!");
    this._ui.log("Quindochi se sintió mimado.");
    this.refresh();
  }

  exercise() {
    if (!this._canAct("exercise")) return;
    const s = this.state;
    s.adjust({ health: 10, happiness: 9, energy: -16, hunger: -10 });
    s.setTemporaryState("euphoric", 1500);
    this._ui.say("¡A moverse!");
    this._ui.log("Quindochi hizo ejercicio.");
    this.refresh();
  }

  clean() {
    if (!this._canAct("clean")) return;
    const s = this.state;
    s.dirty = 0;
    s.coins += 5;
    s.adjust({ health: 6, happiness: 4 });
    s.setTemporaryState("euphoric", 1700);
    this._sound.play("clean");
    this._trash.clearAnimated();
    this._ui.playCleanFx();
    this._ui.say("Todo limpio.");
    this._ui.log("Quindochi limpió su espacio y ganó 5 monedas.");
    this.refresh();
  }

  openShop() {
    if (!this._canAct("shop")) return;
    this._shop.open();
    this.refresh();
  }

  closeModal() {
    this._minigames.close();
    if (this.state.shopOpen) this._shop.close();
    this.refresh();
  }

  reward(type, amount) {
    const s = this.state;
    s.coins += amount;
    s.adjust(type === "seed" ? { happiness: 14, energy: -9 } : { happiness: 8, energy: -5 });
    s.dirty = clamp(s.dirty + (type === "seed" ? 6 : 3));
    s.setTemporaryState("euphoric", 1600);
    this._ui.log(`Quindochi ganó ${amount} monedas jugando.`);
    this.refresh();
  }

  setStat(name, value) {
    this.state.setStat(name, value);
    this.refresh();
  }

  addCoins(value) {
    this.state.coins = Math.max(0, this.state.coins + Math.round(value));
    this.refresh();
  }

  forceState(name) {
    const allowed = ["idle", "eating", "sleeping", "sad", "hungry", "drowsy", "angry", "euphoric", "dead"];
    if (!allowed.includes(name)) name = "idle";
    if (name === "dead") {
      this.kill();
      return;
    }
    this.state.setTemporaryState(name, 10000);
    this.refresh();
  }

  setTime(value) {
    const text = String(value || "").trim();
    const match = text.match(/^(\d{1,2})(?::(\d{1,2}))?$/);
    if (!match) throw new Error("Usa settime HH o settime HH:MM.");
    const hour = Number(match[1]);
    const minute = match[2] === undefined ? 0 : Number(match[2]);
    const label = this._ui.setTimeOverride(hour, minute);
    this._ui.log(`Hora de prueba activada: ${label}. Usa realtime para volver.`);
    return label;
  }

  useRealTime() {
    this._ui.clearTimeOverride();
    this._ui.log("Hora real restaurada. El fondo vuelve a seguir el reloj del dispositivo.");
    this.refresh();
  }

  setAge(age) {
    if (!Number.isFinite(age)) age = 0;
    if (age <= 0) {
      this.state.isDead = false;
      this.state.isTranscendent = false;
      this.state.stage = "egg";
      this.state.eggStartedAt = Date.now();
      this.state.stageStartedAt = Date.now();
      this.state.eggPhase = "shaking";
      this.state.eggCracked = false;
      this.refresh();
      return;
    }
    if (age >= 40) {
      this._reviveForDebug();
      this._enterStage("transcend");
      return;
    }
    const stage = age < 14 ? "baby" : age < 27 ? "child" : "adult";
    this.setStage(stage);
    const cfg = LIFE_STAGES[stage];
    const fraction = clamp((age - cfg.minAge) / (cfg.maxAge - cfg.minAge), 0, 1);
    this.state.stageStartedAt = Date.now() - cfg.durationMs * fraction;
    this.refresh();
  }

  setStage(stage) {
    if (!LIFE_STAGES[stage]) stage = "baby";
    this._reviveForDebug();
    this.state.isStoryOpen = false;
    this.state.isTranscendent = false;
    this.state.stage = stage;
    this.state.stageStartedAt = Date.now();
    this.state.eggStartedAt = stage === "egg" ? Date.now() : 0;
    this.state.eggPhase = stage === "egg" ? "shaking" : "intact";
    this.state.eggCracked = false;
    if (stage === "transcend") this.state.isTranscendent = true;
    this._ui.log(`Etapa forzada: ${LIFE_STAGES[stage].label}.`);
    this.refresh();
  }

  _reviveForDebug() {
    const s = this.state;
    s.isDead = false;
    if (s.health <= 0) s.health = 80;
    if (s.hunger <= 0) s.hunger = 80;
    if (s.energy <= 0) s.energy = 80;
    if (s.happiness <= 0) s.happiness = 80;
  }

  kill() {
    const s = this.state;
    if (s.stage === "egg" || s.isTranscendent) return;
    s.isDead = true;
    s.shopOpen = false;
    s.health = 0;
    s.hunger = Math.min(s.hunger, 0);
    s.energy = Math.min(s.energy, 0);
    s.happiness = Math.min(s.happiness, 0);
    this._shop.close();
    this._minigames.close();
    this._sound.play("death");
    this._ui.say("Quindochi ha muerto.", 0);
    this._ui.log("Quindochi murió por falta de cuidados. Usa reset para empezar de nuevo.");
    this.refresh();
  }
}

const _game = new Quindochi();
window._game = _game;
_game.init();

function actionFeed() { _game.feed(); }
function actionPlay() { _game.play(); }
function actionSleep() { _game.sleep(); }
function actionHeal() { _game.heal(); }
function actionPet() { _game.pet(); }
function actionExercise() { _game.exercise(); }
function actionClean() { _game.clean(); }
function openShop() { _game.openShop(); }
function closeModal() { _game.closeModal(); }

</script>
